---
# Shuts down and deletes demo VMs on US-Otava after a demo session.
#
# USAGE:
#   source ~/.scale_env && ansible-playbook -i scale_playbooks/inventory_with_clusters \
#     scale_playbooks/cleanup_demo_vms.yml

- name: Shutdown and delete demo VMs from US-Otava
  hosts: US_Otava_node1
  connection: local
  gather_facts: false

  environment:
    SC_HOST: "https://10.8.12.10"
    SC_USERNAME: "{{ sc_username }}"
    SC_PASSWORD: "{{ sc_password }}"

  tasks:
    - name: Get all VMs from cluster
      scale_computing.hypercore.vm_info:
      register: all_vms

    - name: Resolve target VM names (case-insensitive)
      ansible.builtin.set_fact:
        target_vms: >-
          {{ all_vms.records
             | map(attribute='vm_name')
             | select('match', '(?i)^(DC02|DC03|USP-S-FINANCE-clone)$')
             | list }}

    - name: Power off demo VMs
      scale_computing.hypercore.vm_params:
        vm_name: "{{ item }}"
        power_state: stop
      loop: "{{ target_vms }}"
      ignore_errors: true

    - name: Wait for power-off to settle
      ansible.builtin.pause:
        seconds: 5

    - name: Delete demo VMs
      scale_computing.hypercore.vm:
        vm_name: "{{ item }}"
        state: absent
      loop: "{{ target_vms }}"
      ignore_errors: true
      register: delete_result

    - name: Cleanup summary
      ansible.builtin.debug:
        msg: |
          Cleanup complete on US-Otava:
          {% for r in delete_result.results %}
          - {{ r.item }}: {{ 'deleted' if r.changed else 'not found / skipped' }}
          {% endfor %}
