# =============================================================================
- name: Send welcome emails to new users
  hosts: localhost
  connection: local
  gather_facts: false
  tags: create
  tasks:
    - name: Email credentials to each new user
      ansible.builtin.command:
        cmd: "{{ ansible_playbook_python }} fetch_sheet_users.py --mode send-emails"
        chdir: "{{ playbook_dir }}"
      changed_when: true

# =============================================================================
- name: Mark new users as done in Google Sheet
  hosts: localhost
  connection: local
  gather_facts: false
  tags: create
  tasks:
    - name: Mark created rows as italic in sheet
      ansible.builtin.command:
        cmd: "{{ ansible_playbook_python }} fetch_sheet_users.py --mode mark-done"
        chdir: "{{ playbook_dir }}"
      changed_when: true
