---
# Creates users on publab HyperCore clusters from Google Sheet data.
# Skips rows already italicized in the sheet (already created).
# After all clusters finish, marks newly created rows italic automatically.
#
# USAGE (from scale_playbooks/):
#   Full run:         ansible-playbook create_publab_users.yml
#   Preview only:     ansible-playbook create_publab_users.yml --tags check
#   Single cluster:   ansible-playbook create_publab_users.yml --tags pub1
#
# PREREQUISITES:
#   1. Set GSHEET_SERVICE_ACCOUNT_FILE and GSHEET_SPREADSHEET_ID env vars.
#   2. pip install google-api-python-client google-auth pyyaml
#   3. Service account must have Editor access to the Google Sheet.
#
# CLUSTER TAGS: pub1, pub2, pub3

# =============================================================================
- name: Fetch users from Google Sheet
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always, check]
  tasks:
    - name: Fetch non-italic users from Google Sheet
      ansible.builtin.command:
        cmd: >-
          {{ ansible_playbook_python }} fetch_sheet_users.py --mode fetch
          {{ '--dry-run' if (ansible_run_tags | intersect(['all', 'create', 'pub1', 'pub2', 'pub3']) | length == 0) else '' }}
          {{ '--override ' + override_users if override_users | default('') else '' }}
        chdir: "{{ playbook_dir }}"
      changed_when: true
      register: fetch_result

    - name: Fetch output
      ansible.builtin.debug:
        msg: "{{ fetch_result.stdout_lines }}"

# =============================================================================
- name: Check - Preview pending users
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [always, check]
  tasks:
    - name: Load users
      ansible.builtin.include_vars: users.yml

    - name: "↩ DUPLICATE SUBMISSIONS — territory team will be notified"
      ansible.builtin.debug:
        msg: "Row {{ item.sheet_row }}: {{ item.full_name }} ({{ item.company }}) — originally submitted {{ item.original_timestamp }}"
      loop: "{{ duplicates | default([]) }}"
      loop_control:
        label: "{{ item.full_name }}"
      when: duplicates | default([]) | length > 0

    - name: "⚠ USERNAME CONFLICTS — resolve these manually in the sheet before re-running"
      ansible.builtin.debug:
        msg: "Row {{ item.sheet_row }}: '{{ item.username }}' ({{ item.full_name }}) — already exists on {{ item.source }}{{ ' (originally row ' + item.original_row | string + ')' if item.original_row is defined else '' }}"
      loop: "{{ conflicts | default([]) }}"
      loop_control:
        label: "{{ item.username }}"
      when: conflicts | default([]) | length > 0

    - name: No new users found
      ansible.builtin.debug:
        msg: "No new users to create — all sheet rows are already marked done."
      when: users | length == 0 and conflicts | default([]) | length == 0 and duplicates | default([]) | length == 0

    - name: "{{ users | length }} user(s) pending creation"
      ansible.builtin.debug:
        msg: "{{ item.username }} | {{ item.full_name }}"
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.username }}"
      when: users | length > 0

# =============================================================================
- name: Create Users - PUB1 (10.5.11.80)
  hosts: PUB1_node1
  connection: local
  gather_facts: false
  tags: [pub1, create]
  environment:
    SC_HOST: "https://10.5.11.80"
    SC_USERNAME: "{{ sc_username }}"
    SC_PASSWORD: "{{ sc_password }}"
  tasks:
    - name: Load users
      ansible.builtin.include_vars: users.yml

    - name: Create user accounts
      scale_computing.hypercore.user:
        username: "{{ item.username }}"
        password: "{{ item.password }}"
        full_name: "{{ item.full_name }}"
        roles:
          - "Read"
          - "Backup"
          - "VM Create/Edit"
          - "VM Delete"
          - "VM Power Controls"
        state: present
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.username }}"
      register: user_results
      when: users | length > 0

    - name: "PUB1 | {{ user_results.results | selectattr('changed') | list | length }} created / {{ user_results.results | rejectattr('changed') | list | length }} already existed"
      ansible.builtin.debug:
        msg: "{{ item.item.username }}: {{ 'created' if item.changed else 'already exists' }}"
      loop: "{{ user_results.results }}"
      loop_control:
        label: "{{ item.item.username }}"
      when: users | length > 0

