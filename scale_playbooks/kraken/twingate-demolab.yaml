---
# Fleet Manager / Kraken Applications manifest
# Deploys two Ubuntu 24.04 VMs as hosts for Twingate connectors (native
# systemd service — connector install/config is done manually after boot).
#
# Docs: https://scalecomputing.github.io/kraken-applications/
#
# Deploy via the Fleet Manager UI (upload/paste this manifest), or via the
# Kraken API/CLI if you have one set up.

type: Application
version: "1"
metadata:
  name: twingate-demolab
  labels:
    - "project:twingate"

spec:
  assets:
    # Shared base image — referenced by both VMs below.
    # "raw" is the only supported non-ISO format today (qcow2/vmdk/vhd(x)
    # are listed as "coming in a future HyperCore version").
    - name: ubuntu-24-04
      type: virtual_disk
      format: raw
      url: https://storage.googleapis.com/demo-bucket-lfm/ubuntu-24.04-qga-qemu.img

  resources:
    - name: ScaleDemo.Twingate5
      type: virdomain
      spec:
        description: Twingate connector host (native service, configured manually)
        cpu: 2
        memory: "4 GiB"
        machine_type: uefi
        os: other
        state: running
        tags:
          - twingate
          - demolab

        storage_devices:
          - name: root-disk
            type: virtio_disk
            source: ubuntu-24-04
            boot: 1
            capacity: "50 GB"

        network_devices:
          - name: eth0
            type: virtio
            vlan: 0

        cloud_init_data:
          user_data: |
            #cloud-config
            hostname: twingate-demolab5
            package_update: true
            packages:
              - qemu-guest-agent
              - curl

            users:
              - name: alex
                groups: sudo
                shell: /bin/bash
                sudo: ALL=(ALL) NOPASSWD:ALL
                lock_passwd: false
                ssh_authorized_keys:
                  - ssh-rsa 

            # Fill in locally, do NOT commit a real value here (plaintext).
            # Prefer a pre-hashed password (e.g. `mkpasswd --method=SHA-512`)
            # over type: text if this file might ever hit git history.
            chpasswd:
              expire: false
              users:
                - name: alex
                  password: CHANGE_ME
                  type: text

            ssh_pwauth: true

            runcmd:
              - systemctl enable --now qemu-guest-agent

          meta_data: |
            instance-id: twingate_demolab5
            local-hostname: twingate-demolab5

    - name: ScaleDemo.Twingate6
      type: virdomain
      spec:
        description: Twingate connector host (native service, configured manually)
        cpu: 2
        memory: "4 GiB"
        machine_type: uefi
        os: other
        state: running
        tags:
          - twingate
          - demolab

        storage_devices:
          - name: root-disk
            type: virtio_disk
            source: ubuntu-24-04
            boot: 1
            capacity: "50 GB"

        network_devices:
          - name: eth0
            type: virtio
            vlan: 0

        cloud_init_data:
          user_data: |
            #cloud-config
            hostname: twingate-demolab6
            package_update: true
            packages:
              - qemu-guest-agent
              - curl

            users:
              - name: alex
                groups: sudo
                shell: /bin/bash
                sudo: ALL=(ALL) NOPASSWD:ALL
                lock_passwd: false
                ssh_authorized_keys:
                  - ssh-rsa 

            # Fill in locally, do NOT commit a real value here (plaintext).
            # Prefer a pre-hashed password (e.g. `mkpasswd --method=SHA-512`)
            # over type: text if this file might ever hit git history.
            chpasswd:
              expire: false
              users:
                - name: alex
                  password: CHANGE_ME
                  type: text

            ssh_pwauth: true

            runcmd:
              - systemctl enable --now qemu-guest-agent

          meta_data: |
            instance-id: twingate_demolab6
            local-hostname: twingate-demolab6
