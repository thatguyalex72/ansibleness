# =============================================================================
- name: Cleanup - VM summary across all clusters
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [never, cleanup]
  tasks:
    - name: Aggregate counts
      ansible.builtin.set_fact:
        all_untagged: >-
          {{ (hostvars['PUB1_node1']['pub1_untagged'] | default([]))
           + (hostvars['PUB2_node1']['pub2_untagged'] | default([]))
           + (hostvars['PUB3_node1']['pub3_untagged'] | default([])) }}
        all_inactive_owned: >-
          {{ (hostvars['PUB1_node1']['pub1_inactive_owned'] | default([]))
           + (hostvars['PUB2_node1']['pub2_inactive_owned'] | default([]))
           + (hostvars['PUB3_node1']['pub3_inactive_owned'] | default([])) }}

    - name: "Summary | {{ all_untagged | length }} untagged VM(s) | {{ all_inactive_owned | length }} VM(s) owned by inactive users | {{ (all_untagged + all_inactive_owned) | length }} total would be deleted"
      ansible.builtin.debug:
        msg: "Total VMs in scope for cleanup: {{ (all_untagged + all_inactive_owned) | length }}"
