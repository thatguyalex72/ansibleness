---
# Lists all VMs across demolab HyperCore clusters.
#
# USAGE (from scale_playbooks/):
#   All clusters:      ansible-playbook list_vms.yml
#   Single cluster:    ansible-playbook list_vms.yml --tags otava
#   All demolab:       ansible-playbook list_vms.yml --tags demolab
#   Only powered on:   ansible-playbook list_vms.yml -e power_filter=started
#   Only powered off:  ansible-playbook list_vms.yml -e power_filter=stopped
#
# CLUSTER TAGS: otava, maverick, goose, 3350f, demolab

# =============================================================================
- name: List VMs - US-Otava
  hosts: US_Otava_node1
  connection: local
  gather_facts: false
  tags: [otava, demolab]
  environment:
    SC_HOST: "https://10.8.12.10"
    SC_USERNAME: "{{ sc_username }}"
    SC_PASSWORD: "{{ sc_password }}"
  tasks:
    - name: Get VM info
      scale_computing.hypercore.vm_info:
      register: all_vms

    - name: Apply power state filter
      ansible.builtin.set_fact:
        vms_to_show: >-
          {{ all_vms.records | selectattr('power_state', 'equalto', power_filter) | list
             if power_filter is defined else all_vms.records }}

    - name: "US-Otava | {{ all_vms.records | selectattr('power_state', 'equalto', 'started') | list | length }} on / {{ all_vms.records | selectattr('power_state', 'equalto', 'stopped') | list | length }} off | {{ vms_to_show | length }} shown"
      ansible.builtin.debug:
        msg: "{{ item.vm_name }} | {{ item.power_state }} | {{ item.vcpu }} vCPU | {{ (item.memory / 1073741824) | round(1) }} GB RAM | {{ ((item.disks | rejectattr('type', 'equalto', 'ide_cdrom') | map(attribute='size') | sum) / 1073741824) | round(1) ~ ' GB disk' if item.disks | rejectattr('type', 'equalto', 'ide_cdrom') | list | length > 0 else 'no disk' }}"
      loop: "{{ vms_to_show }}"
      loop_control:
        label: "{{ item.vm_name }}"
      when: vms_to_show | length > 0

    - name: No VMs match filter
      ansible.builtin.debug:
        msg: "No VMs in state '{{ power_filter | default('') }}' on US-Otava."
      when:
        - power_filter is defined
        - vms_to_show | length == 0

